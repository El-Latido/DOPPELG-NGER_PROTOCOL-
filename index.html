<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOPPELGÄNGER_PROTOCOL | Pre-Alpha v0.1</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; border: 20px solid rgba(255, 0, 0, 0.05); box-sizing: border-box;
            transition: filter 0.1s;
        }
        .hud { position: absolute; color: #00ff88; text-shadow: 0 0 5px #00ff88; padding: 20px; font-size: 14px; }
        .top-left { top: 0; left: 0; }
        .bottom-right { bottom: 0; right: 0; color: #ff0055; text-shadow: 0 0 5px #ff0055; text-align: right; }
        
        #static-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUPr9WvA9RWv2/giphy.gif');
            opacity: 0; mix-blend-mode: screen; pointer-events: none; z-index: 20;
            transition: opacity 0.1s;
        }
        .glitch-effect { filter: hue-rotate(90deg) contrast(200%) brightness(1.5) blur(1px); }

        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; border: 1px solid rgba(0, 255, 136, 0.5);
            transform: translate(-50%, -50%); border-radius: 50%;
        }
        #instructions {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; background: rgba(0,0,0,0.9);
            padding: 30px; border: 1px solid #00ff88; cursor: pointer; z-index: 30;
        }
        .battery-bar { width: 100px; height: 10px; border: 1px solid #00ff88; display: inline-block; margin-left: 5px; }
        #battery-fill { height: 100%; background: #00ff88; width: 100%; transition: width 0.3s; }
    </style>
</head>
<body>

    <div id="static-overlay"></div>

    <div id="ui-layer">
        <div class="hud top-left">
            > STATUS: OPERACIÓN ELYSIUM-9<br>
            > LINTERNA: <span id="battery-level">100</span>% 
            <div class="battery-bar"><div id="battery-fill"></div></div><br>
            > SISTEMA: <span id="light-status" style="color:#00ff88">NOMINAL</span>
        </div>
        <div id="crosshair"></div>
        <div class="hud bottom-right">
            <div id="warning">IDENTIDAD VERIFICADA</div>
            <div id="room-name" style="font-size: 10px; opacity: 0.6;">SISTEMA DOPPELGÄNGER ACTIVO</div>
        </div>
    </div>

    <div id="instructions">
        <h1 style="letter-spacing: 10px;">DOPPELGÄNGER PROTOCOL</h1>
        <p style="color: #00ff88; font-weight: bold;">ADVERTENCIA: Interferencia detectada en proximidad.</p>
        <p>TOCA LA PANTALLA PARA ENTRAR</p>
        <small style="margin-top:10px; opacity:0.6;">(Desliza para mirar | 2 dedos para caminar)</small>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { io } from "https://cdn.socket.io/4.7.2/socket.io.esm.min.js";

        let socket;
        try {
            socket = io("https://doppelg-nger-protocol.onrender.com", {
                transports: ['websocket'],
                upgrade: false
            });
        } catch (e) {
            socket = { emit: () => {}, on: () => {} }; 
        }

        let camera, scene, renderer, controls, flashLight;
        let moveForward = false, battery = 100;
        let isGlitching = false, touchX = null, touchY = null;
        const otherPlayers = {}; 
        const velocity = new THREE.Vector3();

        const wallMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1c, metalness: 0.8, roughness: 0.2 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0b, roughness: 1.0 });
        const screenMat = new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00ff88, emissiveIntensity: 0.5 });

        init();
        createStation();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010103);
            scene.fog = new THREE.FogExp2(0x010103, 0.1);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5); 

            flashLight = new THREE.PointLight(0x00ff88, 2.5, 35); 
            camera.add(flashLight);
            scene.add(camera);

            const ambientLight = new THREE.AmbientLight(0x4040ff, 0.03); 
            scene.add(ambientLight);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            controls = new PointerLockControls(camera, renderer.domElement);
            const blocker = document.getElementById('instructions');

            const startAction = (e) => {
                e.preventDefault();
                blocker.style.display = 'none'; 
                if (controls.lock) controls.lock();
            };

            blocker.addEventListener('touchstart', startAction, { passive: false });
            blocker.addEventListener('click', startAction);

            document.addEventListener('touchstart', (e) => {
                touchX = e.touches[0].pageX;
                touchY = e.touches[0].pageY;
                if (e.touches.length > 1) moveForward = true;
            }, { passive: false });

            document.addEventListener('touchmove', (e) => {
                if (blocker.style.display === 'none') {
                    const dx = e.touches[0].pageX - touchX;
                    const dy = e.touches[0].pageY - touchY;
                    camera.rotation.y -= dx * 0.007;
                    camera.rotation.x -= dy * 0.007;
                    camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
                    touchX = e.touches[0].pageX;
                    touchY = e.touches[0].pageY;
                }
            }, { passive: false });

            document.addEventListener('touchend', (e) => {
                if (e.touches.length < 2) moveForward = false;
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            socket.on('player_moved', (data) => {
                if (!otherPlayers[data.id]) {
                    const group = new THREE.Group();
                    const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.8, 0.5), new THREE.MeshStandardMaterial({ color: 0x333333 }));
                    const visor = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.2, 0.1), new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00ff88 }));
                    visor.position.set(0, 0.6, 0.25);
                    group.add(body, visor);
                    otherPlayers[data.id] = group;
                    scene.add(group);
                }
                otherPlayers[data.id].position.copy(data.position);
                otherPlayers[data.id].rotation.y = data.rotation;
            });
        }

        function triggerHorrorEffect() {
            if (isGlitching) return;
            isGlitching = true;
            const overlay = document.getElementById('static-overlay');
            const ui = document.getElementById('ui-layer');
            overlay.style.opacity = "0.8";
            ui.classList.add('glitch-effect');
            setTimeout(() => {
                overlay.style.opacity = "0";
                ui.classList.remove('glitch-effect');
                isGlitching = false;
            }, 2000);
        }

        function createWall(w, h, d, x, y, z, isPanel = false) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            
            if(isPanel) { // Añadir un "brillo" táctico como en tu imagen
                const screen = new THREE.Mesh(new THREE.PlaneGeometry(w*0.8, h*0.4), screenMat);
                screen.position.set(x + (x<0 ? 0.51 : -0.51), y + 0.5, z);
                screen.rotation.y = x<0 ? Math.PI/2 : -Math.PI/2;
                scene.add(screen);
            }
        }

        function setupRoom(z, side, color, name, propType) {
            const size = 12;
            const xPos = (size / 2 + 5) * side;
            const roomFloor = new THREE.Mesh(new THREE.PlaneGeometry(size, size), floorMat);
            roomFloor.rotation.x = -Math.PI / 2;
            roomFloor.position.set(xPos, 0.01, z);
            scene.add(roomFloor);

            createWall(size, 5, 0.5, xPos, 2.5, z - size/2); 
            createWall(size, 5, 0.5, xPos, 2.5, z + size/2); 
            createWall(0.5, 5, size, xPos + (size/2 * side), 2.5, z, true); // Pared con panel

            const light = new THREE.PointLight(color, 1.5, 20);
            light.position.set(xPos, 4, z);
            scene.add(light);
        }

        function createStation() {
            const pasilloLargo = 120;
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(10, pasilloLargo), floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.z = -pasilloLargo/2 + 10;
            scene.add(floor);

            for(let i = 0; i < 12; i++) {
                const z = -i * 10;
                if (i % 2 !== 0) { 
                    createWall(1, 4, 10, -5, 2, z, true); 
                    createWall(1, 4, 10, 5, 2, z, true);
                }
            }

            // Salas específicas
            setupRoom(-10, -1, 0xff3300, "MÁQUINAS", "cylinder");
            setupRoom(-30, 1, 0x00ff88, "CARGA", "box");
            setupRoom(-50, -1, 0x0055ff, "CIENCIAS", "table");
            setupRoom(-70, 1, 0x00ffff, "COMPUTADORAS", "box");
            setupRoom(-90, -1, 0x555555, "DESECHOS", "cylinder");

            // GRAN VENTANAL AL FINAL (Como en la imagen)
            const windowFrame = new THREE.Mesh(new THREE.TorusGeometry(8, 0.5, 16, 6), wallMat);
            windowFrame.position.set(0, 4, -110);
            scene.add(windowFrame);
            
            const spaceLight = new THREE.PointLight(0x4444ff, 2, 50);
            spaceLight.position.set(0, 5, -115);
            scene.add(spaceLight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const blocker = document.getElementById('instructions');
            if (blocker && blocker.style.display === 'none') {
                const delta = 0.016;
                if (battery > 0) battery -= 0.005;
                document.getElementById('battery-level').innerText = Math.floor(battery);
                document.getElementById('battery-fill').style.width = battery + "%";

                Object.keys(otherPlayers).forEach(id => {
                    if (camera.position.distanceTo(otherPlayers[id].position) < 4) triggerHorrorEffect();
                });

                velocity.z -= velocity.z * 10.0 * delta;
                if (moveForward) velocity.z -= 400.0 * delta;
                controls.moveForward(-velocity.z * delta);

                if (socket.connected) {
                    socket.emit('move', { position: camera.position, rotation: camera.rotation.y });
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
