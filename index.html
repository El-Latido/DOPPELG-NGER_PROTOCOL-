<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOPPELGÄNGER_PROTOCOL | Dev_View</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: 'Courier New', monospace; touch-action: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .hud { position: absolute; color: #00ff88; padding: 20px; font-size: 14px; background: rgba(0,0,0,0.5); }
        #instructions {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            color: white; background: rgba(0,0,0,0.8); z-index: 30;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="hud">> MODO VISUALIZACIÓN COMPLETA ACTIVO</div>
    </div>

    <div id="instructions">
        <h1>MAPA REVELADO</h1>
        <p>TOCA PARA EXPLORAR SIN OSCURIDAD</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let camera, scene, renderer, controls;
        let moveForward = false, touchX = null, touchY = null;
        const velocity = new THREE.Vector3();

        init();
        loadMap();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x333344); // Fondo gris azulado para ver los bordes

            // --- ELIMINADA LA NIEBLA PARA VER TODO EL MAPA ---

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 5, 15); // Un poco más alto para perspectiva

            // --- LUZ AMBIENTAL MÁXIMA ---
            const light = new THREE.AmbientLight(0xffffff, 1.5); // Luz blanca pura y fuerte
            scene.add(light);

            const sunLight = new THREE.DirectionalLight(0xffffff, 1);
            sunLight.position.set(5, 10, 7.5);
            scene.add(sunLight);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new PointerLockControls(camera, renderer.domElement);
            const blocker = document.getElementById('instructions');

            blocker.addEventListener('click', () => {
                blocker.style.display = 'none';
                controls.lock();
            });

            // Controles básicos para móvil
            document.addEventListener('touchstart', (e) => {
                touchX = e.touches[0].pageX;
                touchY = e.touches[0].pageY;
                moveForward = true;
            });
            document.addEventListener('touchmove', (e) => {
                const dx = e.touches[0].pageX - touchX;
                const dy = e.touches[0].pageY - touchY;
                camera.rotation.y -= dx * 0.005;
                camera.rotation.x -= dy * 0.005;
                touchX = e.touches[0].pageX;
                touchY = e.touches[0].pageY;
            });
            document.addEventListener('touchend', () => moveForward = false);
        }

        function loadMap() {
            const loader = new GLTFLoader();
            const testMapURL = 'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/models/gltf/Rooms.glb';

            loader.load(testMapURL, (gltf) => {
                const map = gltf.scene;
                map.scale.set(2, 2, 2); 
                scene.add(map);

                // Forzar a que todo sea brillante
                map.traverse((node) => {
                    if (node.isMesh) {
                        node.material.transparent = false;
                        node.material.opacity = 1;
                        if(node.material.emissive) {
                            node.material.emissiveIntensity = 0.2; // Un poco de brillo propio
                        }
                    }
                });
                console.log("Mapa cargado con brillo total");
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls.isLocked || document.getElementById('instructions').style.display === 'none') {
                const delta = 0.016;
                velocity.z -= velocity.z * 10.0 * delta;
                if (moveForward) velocity.z -= 300.0 * delta;
                controls.moveForward(-velocity.z * delta);
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
