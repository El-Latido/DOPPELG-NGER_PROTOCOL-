<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DOPPELGÄNGER_PROTOCOL | Pre-Alpha v0.1</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; border: 20px solid rgba(255, 0, 0, 0.05); box-sizing: border-box;
        }
        .hud { position: absolute; color: #00ff88; text-shadow: 0 0 5px #00ff88; padding: 20px; font-size: 14px; }
        .top-left { top: 0; left: 0; }
        .bottom-right { bottom: 0; right: 0; color: #ff0055; text-shadow: 0 0 5px #ff0055; text-align: right; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; border: 1px solid rgba(0, 255, 136, 0.5);
            transform: translate(-50%, -50%); border-radius: 50%;
        }
        #instructions {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; text-align: center; pointer-events: auto; background: rgba(0,0,0,0.9);
            padding: 30px; border: 1px solid #00ff88; cursor: pointer; z-index: 10;
        }
        .battery-bar { width: 100px; height: 10px; border: 1px solid #00ff88; display: inline-block; margin-left: 5px; }
        #battery-fill { height: 100%; background: #00ff88; width: 100%; transition: width 0.3s; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="hud top-left">
            > STATUS: REPARANDO REACTOR<br>
            > OXÍGENO: 94%<br>
            > LINTERNA: <span id="battery-level">100</span>% 
            <div class="battery-bar"><div id="battery-fill"></div></div><br>
            > SISTEMA: <span id="light-status" style="color:#00ff88">NOMINAL</span>
        </div>
        <div id="crosshair"></div>
        <div class="hud bottom-right">
            <div id="warning">IDENTIDAD VERIFICADA</div>
            <div id="player-count">BUSCANDO SEÑALES...</div>
        </div>
    </div>

    <div id="instructions">
        <h1>DOPPELGÄNGER PROTOCOL</h1>
        <p style="color: #00ff88;">ADVERTENCIA: No confíes en nadie.</p>
        <p>Haz clic para entrar a la estación</p>
        <small>(WASD: Mover | MOUSE: Mirar | ESC: Salir)</small>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { io } from "https://cdn.socket.io/4.7.2/socket.io.esm.min.js";

        // --- CONFIGURACIÓN DE RED ---
        const socket = io(); // Conexión al servidor app.js

        // --- VARIABLES GLOBALES ---
        let camera, scene, renderer, controls, flashLight;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let battery = 100;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const otherPlayers = {}; // Contenedor para los otros astronautas

        init();
        animate();

        function init() {
            // 1. ESCENA Y NIEBLA
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010103);
            scene.fog = new THREE.FogExp2(0x010103, 0.18);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.6;

            // 2. LINTERNA (PointLight unida a la cámara)
            flashLight = new THREE.PointLight(0x00ff88, 1, 18);
            flashLight.castShadow = true;
            camera.add(flashLight);
            scene.add(camera);

            const ambientLight = new THREE.AmbientLight(0x404040, 0.01); 
            scene.add(ambientLight);

            // 3. ENTORNO
            const floorGeo = new THREE.PlaneGeometry(200, 200);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.9 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Generar Pasillo Metálico
            for(let i = 0; i < 15; i++) {
                const wallGeo = new THREE.BoxGeometry(1.5, 4, 10);
                const wallMat = new THREE.MeshStandardMaterial({ color: 0x151515, metalness: 0.8 });
                
                const leftWall = new THREE.Mesh(wallGeo, wallMat);
                leftWall.position.set(-4.5, 2, -i * 10);
                scene.add(leftWall);

                const rightWall = new THREE.Mesh(wallGeo, wallMat);
                rightWall.position.set(4.5, 2, -i * 10);
                scene.add(rightWall);
            }

            // 4. CONTROLES Y EVENTOS
            controls = new PointerLockControls(camera, document.body);
            const blocker = document.getElementById('instructions');

            blocker.addEventListener('click', () => controls.lock());
            controls.addEventListener('lock', () => blocker.style.display = 'none');
            controls.addEventListener('unlock', () => blocker.style.display = 'block');

            const onKeyDown = (e) => {
                switch (e.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyD': moveRight = true; break;
                }
            };
            const onKeyUp = (e) => {
                switch (e.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            };
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            // 5. RENDERER
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', onWindowResize);

            // 6. LÓGICA MULTIJUGADOR (SOCKET)
            socket.on('player_moved', (data) => {
                if (!otherPlayers[data.id]) {
                    // Si el jugador es nuevo, crear su "cuerpo" (Cubo/Astronatura)
                    const geo = new THREE.BoxGeometry(0.8, 1.8, 0.5);
                    const mat = new THREE.MeshStandardMaterial({ color: 0xffffff });
                    otherPlayers[data.id] = new THREE.Mesh(geo, mat);
                    scene.add(otherPlayers[data.id]);
                }
                otherPlayers[data.id].position.copy(data.position);
                otherPlayers[data.id].rotation.y = data.rotation;
            });

            socket.on('player_disconnected', (id) => {
                if (otherPlayers[id]) {
                    scene.remove(otherPlayers[id]);
                    delete otherPlayers[id];
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function updateHUD() {
            const batteryFill = document.getElementById('battery-fill');
            const batteryText = document.getElementById('battery-level');
            const lightStatus = document.getElementById('light-status');

            batteryText.innerText = Math.floor(battery);
            batteryFill.style.width = battery + "%";

            if (battery < 20) {
                batteryFill.style.background = "#ff0055";
                lightStatus.innerText = "CRÍTICO";
                lightStatus.style.color = "#ff0055";
                // Efecto de parpadeo
                if (Math.random() > 0.85) flashLight.intensity = Math.random();
            } else {
                flashLight.intensity = 1.0;
            }

            if (battery <= 0) {
                flashLight.intensity = 0;
                lightStatus.innerText = "OFFLINE";
                document.getElementById('warning').innerText = "ERROR: SIN LUZ";
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                const delta = 0.015;

                // Consumo de batería
                if (battery > 0) battery -= 0.02;
                updateHUD();

                // Física de movimiento
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                // Enviar posición al servidor AXISS
                socket.emit('move', {
                    id: socket.id,
                    position: camera.position,
                    rotation: camera.rotation.y
                });
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
