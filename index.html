<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOPPELGÄNGER_PROTOCOL | Vision_Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Courier New', monospace; touch-action: none; }
        #instructions {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #00ff88; background: rgba(0,0,0,0.9); z-index: 30; text-align: center;
        }
        .debug-info { position: absolute; top: 10px; left: 10px; color: #00ff88; font-size: 10px; pointer-events: none; }
    </style>
</head>
<body>

    <div class="debug-info" id="status">ESTADO: CARGANDO NAVE...</div>

    <div id="instructions">
        <h1 style="letter-spacing: 5px;">SISTEMA DE VISIÓN ACTIVO</h1>
        <p>EL GRIS HA SIDO ELIMINADO</p>
        <button style="padding: 15px 30px; background: #00ff88; border: none; font-family: inherit; font-weight: bold; cursor: pointer;">
            ENTRAR A LA ESTACIÓN
        </button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let camera, scene, renderer, controls;
        let moveForward = false, touchX = null, touchY = null;
        const velocity = new THREE.Vector3();

        init();
        loadMap();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510); // Fondo azul muy oscuro (espacio)

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
            // MOVEMOS LA CÁMARA FUERA DEL BLOQUE GRIS (Más arriba y atrás)
            camera.position.set(0, 10, 30); 

            // --- LUCES POTENTES PARA ELIMINAR EL GRIS PLANO ---
            const ambient = new THREE.AmbientLight(0xffffff, 0.8); 
            scene.add(ambient);

            const topLight = new THREE.DirectionalLight(0x4444ff, 1.5);
            topLight.position.set(0, 50, 0);
            scene.add(topLight);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new PointerLockControls(camera, renderer.domElement);
            const blocker = document.getElementById('instructions');

            blocker.addEventListener('click', () => {
                blocker.style.display = 'none';
                controls.lock();
            });

            // Controles para móvil
            document.addEventListener('touchstart', (e) => { touchX = e.touches[0].pageX; touchY = e.touches[0].pageY; moveForward = true; });
            document.addEventListener('touchmove', (e) => {
                const dx = e.touches[0].pageX - touchX;
                const dy = e.touches[0].pageY - touchY;
                camera.rotation.y -= dx * 0.005;
                camera.rotation.x -= dy * 0.005;
                touchX = e.touches[0].pageX; touchY = e.touches[0].pageY;
            });
            document.addEventListener('touchend', () => moveForward = false);
        }

        function loadMap() {
            const loader = new GLTFLoader();
            // Mapa de prueba oficial de Three.js
            const url = 'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/models/gltf/Rooms.glb';

            loader.load(url, (gltf) => {
                const map = gltf.scene;
                map.scale.set(5, 5, 5); // Escala grande para poder caminar dentro
                
                // --- TRUCO: CAMBIAR EL GRIS POR METAL AZULADO ---
                map.traverse((node) => {
                    if (node.isMesh) {
                        node.material = new THREE.MeshStandardMaterial({
                            color: 0x223344, // Color metal azulado
                            metalness: 0.9,
                            roughness: 0.2,
                            wireframe: false // Cambia a true si quieres ver la estructura
                        });
                    }
                });

                scene.add(map);
                document.getElementById('status').innerText = "ESTADO: NAVE DESPLEGADA";
            }, 
            (xhr) => {
                let p = Math.floor(xhr.loaded / xhr.total * 100);
                document.getElementById('status').innerText = "CARGANDO: " + p + "%";
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls.isLocked || document.getElementById('instructions').style.display === 'none') {
                const delta = 0.016;
                velocity.z -= velocity.z * 10.0 * delta;
                if (moveForward) velocity.z -= 400.0 * delta;
                controls.moveForward(-velocity.z * delta);
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
