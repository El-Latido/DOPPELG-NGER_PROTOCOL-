<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DOPPELGÄNGER_PROTOCOL | Pre-Alpha v0.1</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; border: 20px solid rgba(255, 0, 0, 0.05); box-sizing: border-box;
        }
        .hud { position: absolute; color: #00ff88; text-shadow: 0 0 5px #00ff88; padding: 20px; }
        .top-left { top: 0; left: 0; }
        .bottom-right { bottom: 0; right: 0; color: #ff0055; text-shadow: 0 0 5px #ff0055; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; border: 1px solid rgba(0, 255, 136, 0.5);
            transform: translate(-50%, -50%); border-radius: 50%;
        }
        #instructions {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; text-align: center; pointer-events: auto; background: rgba(0,0,0,0.8);
            padding: 20px; border: 1px solid #00ff88; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="hud top-left">
            > STATUS: REPARANDO REACTOR<br>
            > OXÍGENO: 94%<br>
            > SEÑAL: ESTABLE
        </div>
        <div id="crosshair"></div>
        <div class="hud bottom-right" id="warning">IDENTIDAD VERIFICADA</div>
    </div>

    <div id="instructions">
        <h1>DOPPELGÄNGER PROTOCOL</h1>
        <p>Haz clic para entrar a la estación espacial</p>
        <small>(WASD para moverte | MOUSE para mirar)</small>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let camera, scene, renderer, controls;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        init();
        animate();

        function init() {
            // 1. ESCENA Y CÁMARA
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.FogExp2(0x020205, 0.15); // Niebla para el terror

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.6; // Altura de los ojos

            // 2. ILUMINACIÓN (Linterna del jugador)
            const light = new THREE.PointLight(0x00ff88, 1, 15);
            camera.add(light);
            scene.add(camera);

            const ambientLight = new THREE.AmbientLight(0x404040, 0.02); // Casi oscuridad
            scene.add(ambientLight);

            // 3. ENTORNO (Pasillo de prueba)
            const floorGeo = new THREE.PlaneGeometry(100, 100);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Paredes (Generamos un pasillo)
            for(let i = 0; i < 10; i++) {
                const wallGeo = new THREE.BoxGeometry(2, 4, 10);
                const wallMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
                const leftWall = new THREE.Mesh(wallGeo, wallMat);
                leftWall.position.set(-4, 2, -i * 10);
                scene.add(leftWall);

                const rightWall = new THREE.Mesh(wallGeo, wallMat);
                rightWall.position.set(4, 2, -i * 10);
                scene.add(rightWall);
            }

            // 4. CONTROLES
            controls = new PointerLockControls(camera, document.body);
            const blocker = document.getElementById('instructions');

            blocker.addEventListener('click', () => controls.lock());
            controls.addEventListener('lock', () => blocker.style.display = 'none');
            controls.addEventListener('unlock', () => blocker.style.display = 'block');

            const onKeyDown = (event) => {
                switch (event.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyD': moveRight = true; break;
                }
            };

            const onKeyUp = (event) => {
                switch (event.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            };

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            // 5. RENDERER
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                const delta = 0.015; // Velocidad del tiempo

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
